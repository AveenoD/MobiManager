version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mobimgr_db
    restart: always
    environment:
      POSTGRES_DB: mobimgr
      POSTGRES_USER: ${DB_USER:-mobimgr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPassword@123}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobimgr_user -d mobimgr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mobimgr_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mobimgr_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: mobimgr_worker_ocr
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mobimgr_user}:${DB_PASSWORD:-StrongPassword@123}@postgres:5432/mobimgr
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-min-32-chars-required-here}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET:-dev-super-admin-jwt-secret-32chars}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-mobimgr}

  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    container_name: mobimgr_otel
    restart: always
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mobimgr_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mobimgr_user}:${DB_PASSWORD:-StrongPassword@123}@postgres:5432/mobimgr
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-min-32-chars-required-here}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET:-dev-super-admin-jwt-secret-32chars}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-mobimgr}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

volumes:
  postgres_data:
  minio_data: